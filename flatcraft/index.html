<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sandbox Craft</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB; /* Sky Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<a href="../index.html" style="position: absolute; top: 20px; right: 20px; color: #ff00ff; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid #ff00ff; text-decoration: none; font-weight: bold; z-index: 1000;">Back to Hub</a>

<div id="ui">
    Move: WASD / Arrows | Left Click: Break | Right Click: Place
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Configuration ---
const TILE_SIZE = 32;
const WORLD_WIDTH = 50;  // Tiles wide
const WORLD_HEIGHT = 20; // Tiles high
const GRAVITY = 0.5;
const JUMP_FORCE = -10;
const SPEED = 4;

// --- Assets/Sprites ---
const COLORS = {
    0: 'transparent', // Air
    1: '#228B22',     // Grass
    2: '#8B4513',     // Dirt
    3: '#808080'      // Stone
};

// --- Game State ---
const world = [];
const player = {
    x: 100,
    y: 100,
    w: 24,
    h: 48,
    vx: 0,
    vy: 0,
    grounded: false
};

const keys = {};

// --- Initialization ---
function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Generate World
    for (let x = 0; x < WORLD_WIDTH; x++) {
        world[x] = [];
        for (let y = 0; y < WORLD_HEIGHT; y++) {
            let type = 0;
            if (y > 10) type = 2; // Dirt layer
            if (y === 10) type = 1; // Grass layer
            if (y > 15) type = 3; // Stone layer
            world[x][y] = type;
        }
    }
    requestAnimationFrame(update);
}

// --- Input Handling ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const tileX = Math.floor(mouseX / TILE_SIZE);
    const tileY = Math.floor(mouseY / TILE_SIZE);

    if (tileX >= 0 && tileX < WORLD_WIDTH && tileY >= 0 && tileY < WORLD_HEIGHT) {
        if (e.button === 0) world[tileX][tileY] = 0; // Break
        if (e.button === 2) world[tileX][tileY] = 2; // Place Dirt
    }
});

// Prevent context menu on right click
window.addEventListener('contextmenu', e => e.preventDefault());

// --- Core Logic ---
function update() {
    // Horizontal Movement
    player.vx = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -SPEED;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx = SPEED;

    // Jump
    if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.grounded) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
    }

    // Apply Gravity
    player.vy += GRAVITY;
    player.grounded = false; // Reset grounded state before checking
    
    // Move Y and Check Collisions
    player.y += player.vy;
    checkCollision('y');

    // Move X and Check Collisions
    player.x += player.vx;
    
    // Clamp X to World Boundaries
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > WORLD_WIDTH * TILE_SIZE) {
        player.x = WORLD_WIDTH * TILE_SIZE - player.w;
    }

    checkCollision('x');

    // Clamp Y to World Bottom (Optional: prevents falling forever)
    if (player.y + player.h > WORLD_HEIGHT * TILE_SIZE) {
        player.y = WORLD_HEIGHT * TILE_SIZE - player.h;
        player.vy = 0;
        player.grounded = true;
    }

    draw();
    requestAnimationFrame(update);
}

function checkCollision(axis) {
    // For X collisions, we ignore the very top and bottom pixels to prevent sticking on floor/ceiling
    // For Y collisions, we ignore the very left and right pixels to prevent sticking on walls
    const skin = 2; 

    if (axis === 'y') {
        const left = Math.floor((player.x + skin) / TILE_SIZE);
        const right = Math.floor((player.x + player.w - skin) / TILE_SIZE);
        const top = Math.floor(player.y / TILE_SIZE);
        const bottom = Math.floor((player.y + player.h) / TILE_SIZE);

        for (let x = left; x <= right; x++) {
            for (let y = top; y <= bottom; y++) {
                if (world[x] && world[x][y] > 0) {
                    if (player.vy > 0) {
                        player.y = y * TILE_SIZE - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    } else if (player.vy < 0) {
                        player.y = (y + 1) * TILE_SIZE;
                        player.vy = 0;
                    }
                }
            }
        }
    } else {
        const left = Math.floor(player.x / TILE_SIZE);
        const right = Math.floor((player.x + player.w) / TILE_SIZE);
        const top = Math.floor((player.y + skin) / TILE_SIZE);
        const bottom = Math.floor((player.y + player.h - skin) / TILE_SIZE);

        for (let x = left; x <= right; x++) {
            for (let y = top; y <= bottom; y++) {
                if (world[x] && world[x][y] > 0) {
                    if (player.vx > 0) player.x = x * TILE_SIZE - player.w;
                    if (player.vx < 0) player.x = (x + 1) * TILE_SIZE;
                }
            }
        }
    }
    
    // Simple floor boundary
    if (player.y > (WORLD_HEIGHT * TILE_SIZE)) player.y = 0;
}

// --- Rendering ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw World
    for (let x = 0; x < WORLD_WIDTH; x++) {
        for (let y = 0; y < WORLD_HEIGHT; y++) {
            const tile = world[x][y];
            if (tile !== 0) {
                ctx.fillStyle = COLORS[tile];
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                // Grid lines for that "craft" look
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Draw Player
    ctx.fillStyle = '#FF6347'; // Tomato Red
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

init();
</script>
</body>
</html>
