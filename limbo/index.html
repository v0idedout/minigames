<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbo</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../hub/" id="back-btn">Back to Hub</a>
    <button id="back-to-menu">BACK TO MODES</button>

    <div id="menu-screen">
        <div id="menu-title">SELECT GAMEMODE</div>
        <div class="modes-container">
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('-EN-008')">-EN-008</button>
                <div class="info-panel">
                    <p>easy, for babies.</p>
                    <p>Speed: <span>370ms</span></p>
                    <p>Time: <span>13.3s</span></p>
                </div>
            </div>
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('EN-008')">EN-008</button>
                <div class="info-panel">
                    <p>average difficulty.</p>
                    <p>Speed: <span>300ms</span></p>
                    <p>Time: <span>13.5s</span></p>
                </div>
            </div>
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('EN-008-02')">EN-008-02</button>
                <div class="info-panel">
                    <p>ultimate eye trainer mode.</p>
                    <p>Speed: <span>300ms</span></p>
                    <p>Time: <span>13.2s</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="status-msg">CLICK TO START THE CHALLENGE</div>
    <div class="game-area" id="stage"></div>

    <div id="win-screen">
        <div class="safe-box">you are safe for now.</div>
        <button id="retry-btn">TRY AGAIN</button>
    </div>

    <div id="death-screen">
        <div class="death-box" id="death-msg">you died to [mode]</div>
        <button id="death-retry-btn">TRY AGAIN</button>
    </div>

    <div id="death-blackout"></div>
    <div id="youtube-player"></div>

    <script src="game.js"></script>
</body>
</html>
