<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* INTEGRATED CSS */
        body {
            background: linear-gradient(to bottom, #7a1d7a 0%, #3d0e3d 40%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        #status-msg {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 50px;
            color: #e0a0ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
            text-transform: uppercase;
            text-align: center;
            display: none;
        }

        .game-area {
            position: relative;
            width: 600px;
            height: 300px;
            z-index: 10;
            display: none;
        }

        .key-sprite {
            position: absolute;
            width: 85px;
            height: 85px;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-sprite svg {
            fill: #ff0000;
            width: 100%;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 2px #000);
        }

        .key-sprite.active svg {
            fill: #00ff00;
            filter: drop-shadow(0 0 15px #00ff00);
        }

        @keyframes key-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        .key-sprite.blinking {
            animation: key-blink 0.5s ease-in-out infinite;
        }

        /* NEW: Blackout Overlay */
        #win-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease;
            z-index: 600;
        }

        #win-screen.visible, #death-screen.visible {
            opacity: 1;
            visibility: visible;
        }

        #death-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
            z-index: 600;
        }

        #death-blackout {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease;
            z-index: 400;
        }

        #death-blackout.visible {
            opacity: 1;
            visibility: visible;
        }

        .safe-box, .death-box {
            border: 1.5px solid #00ff00;
            padding: 12px 35px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-size: 18px;
            font-weight: 300;
            white-space: nowrap;
            transition: transform 1.5s ease-in-out;
        }

        .death-box {
            border-color: #ff0000;
            color: #ff0000;
        }

        #retry-btn, #death-retry-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease, background 0.3s;
        }

        #death-retry-btn {
            border-color: #ff0000;
            color: #ff0000;
        }

        #retry-btn:hover, #death-retry-btn:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        #death-retry-btn:hover {
            background: rgba(255, 0, 0, 0.1);
        }

        #youtube-player {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            z-index: 500;
            visibility: hidden;
            pointer-events: none;
        }

        /* Ensure the video fills the screen (covering black bars) */
        @media (min-aspect-ratio: 16/9) {
            #youtube-player {
                height: 56.25vw;
            }
        }

        @media (max-aspect-ratio: 16/9) {
            #youtube-player {
                width: 177.78vh;
            }
        }
        
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff00ff;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
        }

        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #menu-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: #e0a0ff;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }

        .modes-container {
            display: flex;
            gap: 30px;
        }

        .mode-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mode-btn {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #e0a0ff;
            color: #fff;
            font-family: inherit;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #e0a0ff;
            box-shadow: 0 0 10px rgba(224, 160, 255, 0.3);
            position: relative;
            z-index: 11;
        }

        .mode-btn:hover {
            background: #e0a0ff;
            color: #000;
            box-shadow: 0 0 20px #e0a0ff;
        }

        .info-panel {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(40, 0, 40, 0.95);
            border: 2px solid #e0a0ff;
            border-top: none;
            padding: 0 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            font-size: 13px;
            color: #ffffff;
            text-align: center;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .mode-wrapper:hover .info-panel {
            max-height: 100px;
            padding: 15px 10px;
        }

        .info-panel p {
            margin: 5px 0;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-panel span {
            color: #e0a0ff;
        }

        #back-to-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e0a0ff;
            background: transparent;
            padding: 8px 15px;
            border: 1px solid #e0a0ff;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            display: none;
            z-index: 1000;
        }

        #back-to-menu:hover {
            background: rgba(224, 160, 255, 0.1);
        }
    </style>
</head>
<body>

    <a href="../index.html" id="back-btn">Back to Hub</a>
    <button id="back-to-menu">BACK TO MODES</button>

    <div id="menu-screen">
        <div id="menu-title">SELECT GAMEMODE</div>
        <div class="modes-container">
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('-EN-008')">-EN-008</button>
                <div class="info-panel">
                    <p>easy, for babies.</p>
                
                    <p>Speed: <span>370ms</span></p>
                    <p>Time: <span>13.3s</span></p>
                </div>
            </div>
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('EN-008')">EN-008</button>
                <div class="info-panel">
                    <p>average difficulty.</p>
                    <p>Speed: <span>300ms</span></p>
                    <p>Time: <span>13.5s</span></p>
                </div>
            </div>
            <div class="mode-wrapper">
                <button class="mode-btn" onclick="selectMode('EN-008-02')">EN-008-02</button>
                <div class="info-panel">
                    <p>ultimate eye trainer mode.</p>
                    <p>Speed: <span>300ms</span></p>
                    <p>Time: <span>13.2s</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="status-msg">CLICK TO START THE CHALLENGE</div>

    <div class="game-area" id="stage">
        </div>

    <div id="win-screen">
        <div class="safe-box">you are safe for now.</div>
        <button id="retry-btn">TRY AGAIN</button>
    </div>

    <div id="death-screen">
        <div class="death-box" id="death-msg">you died to [mode]</div>
        <button id="death-retry-btn">TRY AGAIN</button>
    </div>

    <div id="death-blackout"></div>

    <div id="youtube-player"></div>

    <script>
        const stage = document.getElementById('stage');
        const status = document.getElementById('status-msg');
        const winScreen = document.getElementById('win-screen');
        const retryBtn = document.getElementById('retry-btn');
        const deathScreen = document.getElementById('death-screen');
        const deathMsg = document.getElementById('death-msg');
        const deathRetryBtn = document.getElementById('death-retry-btn');
        const menuScreen = document.getElementById('menu-screen');
        const backToMenuBtn = document.getElementById('back-to-menu');
        const blackout = document.getElementById('death-blackout');
        const deathVideoId = '7JspcP6uP5s';
        const ambientVideoId = 'OmahQ9RFOPo';
       
        const grid = [
            {x: 100, y: 75}, {x: 300, y: 75}, {x: 500, y: 75},
            {x: 100, y: 225}, {x: 300, y: 225}, {x: 500, y: 225}
        ];

        let keyObjects = [];
        let winningId = null;
        let isInputLocked = true;
        let player;
        let gameStarted = false;
        let selectionTimer = null;
        let currentMode = null;

        // Track ALL timeouts and intervals so we can cancel them on mode switch
        let shuffleTimeout = null;
        let fadeInInterval = null;
        let fadeOutInterval = null;
        let resetTimeout = null;
        let eliminateTimeout = null;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: ambientVideoId,
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 0, 
                    'showinfo': 0, 
                    'rel': 0, 
                    'iv_load_policy': 3,
                    'modestbranding': 1
                },
                events: { 
                    'onReady': () => console.log("Audio Ready"),
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            // Check if the death video has ended
            if (event.data === YT.PlayerState.ENDED && player.getVideoData().video_id === deathVideoId) {
                showDeathScreen();
            }
        }

        function showDeathScreen() {
            deathMsg.innerText = `you died to ${currentMode}`;
            deathScreen.classList.add('visible');
            
            // Pan text up and fade in retry button
            setTimeout(() => {
                deathMsg.style.transform = 'translateY(-30px)';
                deathRetryBtn.style.opacity = "1";
                deathRetryBtn.style.pointerEvents = "auto";
            }, 500);
        }

        // Central cleanup: cancel every pending timer/interval
        function cleanupAll() {
            if (selectionTimer) { clearInterval(selectionTimer); selectionTimer = null; }
            if (shuffleTimeout) { clearTimeout(shuffleTimeout); shuffleTimeout = null; }
            if (fadeInInterval) { clearInterval(fadeInInterval); fadeInInterval = null; }
            if (fadeOutInterval) { clearInterval(fadeOutInterval); fadeOutInterval = null; }
            if (resetTimeout) { clearTimeout(resetTimeout); resetTimeout = null; }
            if (eliminateTimeout) { clearTimeout(eliminateTimeout); eliminateTimeout = null; }
            if (player && typeof player.pauseVideo === 'function') {
                try { player.pauseVideo(); } catch(e) {}
            }
        }

        function selectMode(mode) {
            cleanupAll();
            currentMode = mode;
            gameStarted = false;
            isInputLocked = true;
            menuScreen.style.display = 'none';
            stage.style.display = 'block';
            status.style.display = 'block';
            status.style.opacity = '1';
            status.innerText = 'CLICK TO START THE CHALLENGE';
            backToMenuBtn.style.display = 'block';
            winScreen.classList.remove('visible');
            deathScreen.classList.remove('visible');
            blackout.classList.remove('visible');
            const safeBox = winScreen.querySelector('.safe-box');
            safeBox.style.transform = 'translateY(0)';
            deathMsg.style.transform = 'translateY(0)';
            retryBtn.style.opacity = '0';
            retryBtn.style.pointerEvents = 'none';
            deathRetryBtn.style.opacity = '0';
            deathRetryBtn.style.pointerEvents = 'none';
            
            init();

            // Ensure player is reset to ambient track
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(ambientVideoId);
                player.pauseVideo();
            }
            document.getElementById('youtube-player').style.visibility = 'hidden';
        }

        function backToMenu() {
            cleanupAll();
            currentMode = null;
            gameStarted = false;
            isInputLocked = true;
            
            menuScreen.style.display = 'flex';
            stage.style.display = 'none';
            status.style.display = 'none';
            backToMenuBtn.style.display = 'none';
            winScreen.classList.remove('visible');
            deathScreen.classList.remove('visible');
            blackout.classList.remove('visible');
            
            status.style.opacity = "1";
            status.innerText = "CLICK TO START THE CHALLENGE";
            
            const safeBox = winScreen.querySelector('.safe-box');
            safeBox.style.transform = 'translateY(0)';
            deathMsg.style.transform = 'translateY(0)';
            retryBtn.style.opacity = "0";
            retryBtn.style.pointerEvents = "none";
            deathRetryBtn.style.opacity = "0";
            deathRetryBtn.style.pointerEvents = "none";
            stage.innerHTML = '';
            keyObjects = [];

            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(ambientVideoId);
                player.pauseVideo();
            }
            document.getElementById('youtube-player').style.visibility = 'hidden';
        }

        backToMenuBtn.onclick = (e) => {
            e.stopPropagation();
            backToMenu();
        };

        function init() {
            stage.innerHTML = '';
            keyObjects = [];
            for(let i = 0; i < 6; i++) {
                const el = document.createElement('div');
                el.className = 'key-sprite';
                el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>`;
                el.style.left = grid[i].x + 'px';
                el.style.top = grid[i].y + 'px';
                const keyObj = { element: el, posIndex: i, id: i };
                el.onclick = () => handleSelection(keyObj);
                stage.appendChild(el);
                keyObjects.push(keyObj);
            }
        }

        function fadeInAudio() {
            if (fadeInInterval) clearInterval(fadeInInterval);
            let volume = 0;
            player.setVolume(0);
            fadeInInterval = setInterval(() => {
                if (volume < 100) {
                    volume += 5;
                    player.setVolume(volume);
                } else {
                    clearInterval(fadeInInterval);
                    fadeInInterval = null;
                }
            }, 100);
        }

        function startChallenge() {
            if(!currentMode || gameStarted || !player) return;
            if(typeof player.playVideo !== 'function') return;
            gameStarted = true;
            status.innerText = "CHOOSE THE CORRECT KEY";
            const minTime = 80;
            const maxTime = 165;
            const startTime = Math.floor(Math.random() * (maxTime - minTime + 1)) + minTime;
            
            document.getElementById('youtube-player').style.visibility = 'hidden';
            player.loadVideoById(ambientVideoId, startTime);
            player.playVideo();
            fadeInAudio();
            revealWinner();
        }

        function revealWinner() {
            winningId = Math.floor(Math.random() * 6);
            keyObjects[winningId].element.classList.add('active');
            shuffleTimeout = setTimeout(() => {
                keyObjects[winningId].element.classList.remove('active');
                if (currentMode === 'EN-008-02') {
                    keyObjects.forEach(obj => obj.element.classList.add('blinking'));
                }
                performShuffle(0);
            }, 1800);
        }

        function performShuffle(count) {
            let shuffleSpeed = 370;
            let totalSteps = 36;

            if (currentMode === 'EN-008') {
                shuffleSpeed = 300;
                totalSteps = 45;
            } else if (currentMode === 'EN-008-02') {
                shuffleSpeed = 300;
                totalSteps = 60;
            }

            if (count >= totalSteps) {
                keyObjects.forEach(obj => obj.element.classList.remove('blinking'));
                startSelectionTimer();
                return;
            }

            const numToShuffle = Math.floor(Math.random() * 3) + 2;
            let indices = [];
            while(indices.length < numToShuffle) {
                let r = Math.floor(Math.random() * 6);
                if(indices.indexOf(r) === -1) indices.push(r);
            }

            let firstPos = keyObjects[indices[0]].posIndex;
            for(let i = 0; i < indices.length - 1; i++) {
                keyObjects[indices[i]].posIndex = keyObjects[indices[i+1]].posIndex;
            }
            keyObjects[indices[indices.length - 1]].posIndex = firstPos;

            keyObjects.forEach(obj => {
                obj.element.style.left = grid[obj.posIndex].x + 'px';
                obj.element.style.top = grid[obj.posIndex].y + 'px';
            });
            shuffleTimeout = setTimeout(() => performShuffle(count + 1), shuffleSpeed);
        }

        function startSelectionTimer() {
            isInputLocked = false;
            let timeLeft = 10;
            status.innerText = `CHOOSE THE CORRECT KEY - ${timeLeft}s`;
            
            selectionTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(selectionTimer);
                    if (!isInputLocked) {
                        triggerDeathSequence();
                    }
                } else {
                    status.innerText = `CHOOSE THE CORRECT KEY - ${timeLeft}s`;
                }
            }, 1000);
        }

        function fadeAudio() {
            if (fadeOutInterval) clearInterval(fadeOutInterval);
            let volume = player.getVolume();
            fadeOutInterval = setInterval(() => {
                if (volume > 0) {
                    volume -= 5;
                    player.setVolume(volume);
                } else {
                    player.pauseVideo();
                    clearInterval(fadeOutInterval);
                    fadeOutInterval = null;
                }
            }, 100);
        }

        function triggerDeathSequence() {
            isInputLocked = true;
            if (selectionTimer) clearInterval(selectionTimer);
            
            // Show blackout first
            blackout.classList.add('visible');

            // Wait for fade to complete before playing video
            setTimeout(() => {
                const playerEl = document.getElementById('youtube-player');
                playerEl.style.visibility = 'visible';
                player.loadVideoById(deathVideoId);
                player.setVolume(100);
                player.playVideo();
            }, 1200);
        }

        function handleSelection(clickedObj) {
            if(isInputLocked) return;
            isInputLocked = true;
            if (selectionTimer) clearInterval(selectionTimer);

            if(clickedObj.id === winningId) {
                fadeAudio();
                status.style.opacity = "0";
                backToMenuBtn.style.display = 'none';
                winScreen.classList.add('visible');

                resetTimeout = setTimeout(() => {
                    const safeBox = winScreen.querySelector('.safe-box');
                    safeBox.style.transform = 'translateY(-30px)';
                    retryBtn.style.opacity = "1";
                    retryBtn.style.pointerEvents = "auto";
                }, 2000);
            } else {
                triggerDeathSequence();
            }
        }

        function resetGame() {
            cleanupAll();
            winScreen.classList.remove('visible');
            deathScreen.classList.remove('visible');
            blackout.classList.remove('visible');
            gameStarted = false;
            isInputLocked = true;
            status.style.opacity = "1";
            status.innerText = "CLICK TO START THE CHALLENGE";
            
            // Reset player visibility
            document.getElementById('youtube-player').style.visibility = 'hidden';
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(ambientVideoId);
                player.pauseVideo();
            }

            backToMenuBtn.style.display = 'block';
            stage.style.display = 'block';
            
            const safeBox = winScreen.querySelector('.safe-box');
            safeBox.style.transform = 'translateY(0)';
            deathMsg.style.transform = 'translateY(0)';
            retryBtn.style.opacity = "0";
            retryBtn.style.pointerEvents = "none";
            deathRetryBtn.style.opacity = "0";
            deathRetryBtn.style.pointerEvents = "none";
            
            init();
        }

        deathRetryBtn.onclick = (e) => {
            e.stopPropagation();
            resetGame();
        };

        retryBtn.onclick = (e) => {
            e.stopPropagation();
            resetGame();
        };

        window.addEventListener('click', (e) => {
            if (e.target.closest('.mode-btn') || e.target.closest('#back-to-menu') || e.target.closest('#retry-btn') || e.target.closest('#death-retry-btn') || e.target.closest('#back-btn')) return;
            if(currentMode && !gameStarted) startChallenge();
        });
    </script>
</body>
</html>
