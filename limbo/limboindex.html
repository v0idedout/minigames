<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* INTEGRATED CSS */
        body {
            background: linear-gradient(to bottom, #7a1d7a 0%, #3d0e3d 40%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        #status-msg {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 50px;
            color: #e0a0ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
            text-transform: uppercase;
            text-align: center;
            display: none;
        }

        .game-area {
            position: relative;
            width: 600px;
            height: 300px;
            z-index: 10;
            display: none;
        }

        .key-sprite {
            position: absolute;
            width: 85px;
            height: 85px;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-sprite svg {
            fill: #ff0000;
            width: 100%;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 2px #000);
        }

        .key-sprite.active svg {
            fill: #00ff00;
            filter: drop-shadow(0 0 15px #00ff00);
        }

        /* NEW: Blackout Overlay */
        #win-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease;
            z-index: 200;
        }

        #win-screen.visible {
            opacity: 1;
            visibility: visible;
        }

        .safe-box {
            border: 1.5px solid #00ff00;
            padding: 12px 35px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-size: 18px;
            font-weight: 300;
            white-space: nowrap;
            transition: transform 1.5s ease-in-out;
        }

        #retry-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease, background 0.3s;
        }

        #retry-btn:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        #youtube-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff00ff;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
        }

        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #menu-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: #e0a0ff;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }

        .modes-container {
            display: flex;
            gap: 30px;
        }

        .mode-btn {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #e0a0ff;
            color: #fff;
            font-family: inherit;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #e0a0ff;
            box-shadow: 0 0 10px rgba(224, 160, 255, 0.3);
        }

        .mode-btn:hover {
            background: #e0a0ff;
            color: #000;
            box-shadow: 0 0 20px #e0a0ff;
            transform: translateY(-5px);
        }

        #back-to-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e0a0ff;
            background: transparent;
            padding: 8px 15px;
            border: 1px solid #e0a0ff;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            display: none;
            z-index: 1000;
        }

        #back-to-menu:hover {
            background: rgba(224, 160, 255, 0.1);
        }
    </style>
</head>
<body>

    <a href="../index.html" id="back-btn">Back to Hub</a>
    <button id="back-to-menu">BACK TO MODES</button>

    <div id="menu-screen">
        <div id="menu-title">SELECT GAMEMODE</div>
        <div class="modes-container">
            <button class="mode-btn" onclick="selectMode('-EN-008')">-EN-008</button>
            <button class="mode-btn" onclick="selectMode('EN-008')">EN-008</button>
            <button class="mode-btn" onclick="selectMode('EN-008-02')">EN-008-02</button>
        </div>
    </div>

    <div id="status-msg">CLICK TO START THE CHALLENGE</div>

    <div class="game-area" id="stage">
        </div>

    <div id="win-screen">
        <div class="safe-box">you are safe for now.</div>
        <button id="retry-btn">TRY AGAIN</button>
    </div>

    <div id="youtube-player"></div>

    <script>
        const stage = document.getElementById('stage');
        const status = document.getElementById('status-msg');
        const winScreen = document.getElementById('win-screen');
        const retryBtn = document.getElementById('retry-btn');
        const menuScreen = document.getElementById('menu-screen');
        const backToMenuBtn = document.getElementById('back-to-menu');
        
        const grid = [
            {x: 100, y: 75}, {x: 300, y: 75}, {x: 500, y: 75},
            {x: 100, y: 225}, {x: 300, y: 225}, {x: 500, y: 225}
        ];

        let keyObjects = [];
        let winningId = null;
        let isInputLocked = true;
        let player;
        let gameStarted = false;
        let selectionTimer = null;
        let currentMode = null;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'OmahQ9RFOPo',
                events: { 'onReady': () => console.log("Audio Ready") }
            });
        }

        function selectMode(mode) {
            currentMode = mode;
            menuScreen.style.display = 'none';
            stage.style.display = 'block';
            status.style.display = 'block';
            backToMenuBtn.style.display = 'block';
            init();
        }

        function backToMenu() {
            if (selectionTimer) clearInterval(selectionTimer);
            if (player) {
                player.pauseVideo();
            }
            currentMode = null;
            gameStarted = false;
            isInputLocked = true;
            
            menuScreen.style.display = 'flex';
            stage.style.display = 'none';
            status.style.display = 'none';
            backToMenuBtn.style.display = 'none';
            winScreen.classList.remove('visible');
            
            status.style.opacity = "1";
            status.innerText = "CLICK TO START THE CHALLENGE";
            
            const safeBox = winScreen.querySelector('.safe-box');
            safeBox.style.transform = 'translateY(0)';
            retryBtn.style.opacity = "0";
            retryBtn.style.pointerEvents = "none";
        }

        backToMenuBtn.onclick = (e) => {
            e.stopPropagation();
            backToMenu();
        };

        function init() {
            stage.innerHTML = '';
            keyObjects = [];
            for(let i = 0; i < 6; i++) {
                const el = document.createElement('div');
                el.className = 'key-sprite';
                el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>`;
                el.style.left = grid[i].x + 'px';
                el.style.top = grid[i].y + 'px';
                const keyObj = { element: el, posIndex: i, id: i };
                el.onclick = () => handleSelection(keyObj);
                stage.appendChild(el);
                keyObjects.push(keyObj);
            }
        }

        function fadeInAudio() {
            let volume = 0;
            player.setVolume(0);
            const fadeInterval = setInterval(() => {
                if (volume < 100) {
                    volume += 5;
                    player.setVolume(volume);
                } else {
                    clearInterval(fadeInterval);
                }
            }, 100);
        }

        function startChallenge() {
            if(!currentMode || gameStarted || !player) return;
            gameStarted = true;
            status.innerText = "CHOOSE THE CORRECT KEY";
            const minTime = 80;
            const maxTime = 165; 
            const startTime = Math.floor(Math.random() * (maxTime - minTime + 1)) + minTime;
            player.seekTo(startTime);
            player.playVideo();
            fadeInAudio();
            revealWinner();
        }

        function revealWinner() {
            winningId = Math.floor(Math.random() * 6);
            keyObjects[winningId].element.classList.add('active');
            setTimeout(() => {
                keyObjects[winningId].element.classList.remove('active');
                performShuffle(0);
            }, 1800);
        }

        function performShuffle(count) {
            // Speed up shuffle for EN-008-02
            let shuffleSpeed = 370;
            let totalSteps = 36;

            if (currentMode === 'EN-008') {
                shuffleSpeed = 300;
                totalSteps = 45;
            } else if (currentMode === 'EN-008-02') {
                shuffleSpeed = 220;
                totalSteps = 60;
            }

            if (count >= totalSteps) { // ~20 seconds (36 * 550ms ≈ 20s)
                startSelectionTimer();
                return;
            }

            // Decide how many keys to shuffle (between 2 and 4)
            const numToShuffle = Math.floor(Math.random() * 3) + 2; 
            
            // Get unique indices to shuffle
            let indices = [];
            while(indices.length < numToShuffle) {
                let r = Math.floor(Math.random() * 6);
                if(indices.indexOf(r) === -1) indices.push(r);
            }

            // Perform a cyclic swap of positions for the selected keys
            let firstPos = keyObjects[indices[0]].posIndex;
            for(let i = 0; i < indices.length - 1; i++) {
                keyObjects[indices[i]].posIndex = keyObjects[indices[i+1]].posIndex;
            }
            keyObjects[indices[indices.length - 1]].posIndex = firstPos;

            keyObjects.forEach(obj => {
                obj.element.style.left = grid[obj.posIndex].x + 'px';
                obj.element.style.top = grid[obj.posIndex].y + 'px';
            });
            setTimeout(() => performShuffle(count + 1), shuffleSpeed);
        }

        function startSelectionTimer() {
            isInputLocked = false;
            let timeLeft = 10;
            status.innerText = `CHOOSE THE CORRECT KEY - ${timeLeft}s`;
            
            selectionTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(selectionTimer);
                    if (!isInputLocked) {
                        isInputLocked = true;
                        fadeAudio();
                        status.innerText = "TIME OUT - ELIMINATED";
                        setTimeout(() => resetGame(), 2000);
                    }
                } else {
                    status.innerText = `CHOOSE THE CORRECT KEY - ${timeLeft}s`;
                }
            }, 1000);
        }

        function fadeAudio() {
            let volume = player.getVolume();
            const fadeInterval = setInterval(() => {
                if (volume > 0) {
                    volume -= 5;
                    player.setVolume(volume);
                } else {
                    player.pauseVideo();
                    clearInterval(fadeInterval);
                }
            }, 100);
        }

        function handleSelection(clickedObj) {
            if(isInputLocked) return;
            isInputLocked = true;
            if (selectionTimer) clearInterval(selectionTimer);
            fadeAudio();

            if(clickedObj.id === winningId) {
                // SUCCESS LOGIC: Fade to black
                status.style.opacity = "0";
                backToMenuBtn.style.display = 'none';
                winScreen.classList.add('visible');

                // Pan text up and fade in retry button after initial blackout
                setTimeout(() => {
                    const safeBox = winScreen.querySelector('.safe-box');
                    safeBox.style.transform = 'translateY(-30px)';
                    retryBtn.style.opacity = "1";
                    retryBtn.style.pointerEvents = "auto";
                }, 2000);
            } else {
                // FAILURE LOGIC
                status.innerText = "ELIMINATED";
                clickedObj.element.style.opacity = "0.1";
                setTimeout(() => resetGame(), 2000);
            }
        }

        function resetGame() {
            if (selectionTimer) clearInterval(selectionTimer);
            winScreen.classList.remove('visible');
            gameStarted = false;
            isInputLocked = true;
            status.style.opacity = "1";
            status.innerText = "CLICK TO START THE CHALLENGE";
            
            // Ensure the back button and game stage are visible
            backToMenuBtn.style.display = 'block';
            stage.style.display = 'block';
            
            // Reset styles for next time
            const safeBox = winScreen.querySelector('.safe-box');
            safeBox.style.transform = 'translateY(0)';
            retryBtn.style.opacity = "0";
            retryBtn.style.pointerEvents = "none";
            
            init();
        }

        window.onclick = () => { if(currentMode && !gameStarted) startChallenge(); };
        // Remove init() from end since it's called in selectMode
    </script>
</body>
</html>
