<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE-ALITY</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        #instructions {
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Health: <span id="health">100</span>%</div>
        <div>Score: <span id="score">0</span></div>
    </div>
    
    <div id="blocker">
        <div id="instructions">
            <span style="font-size:36px">Click to Play</span>
            <br /><br />
            Move: W, A, S, D<br/>
            Jump: Space<br/>
            Look: Mouse<br/>
            Run Away from the Red Enemies!
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Game State
        let enemies = [];
        let score = 0;
        let health = 100;
        let lastEnemySpawn = 0;
        let isGameOver = false;

        const scoreEl = document.getElementById('score');
        const healthEl = document.getElementById('health');
        const instructions = document.getElementById('instructions');
        const blocker = document.getElementById('blocker');

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 0, 750);

            // Lighting
            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);

            // Controls
            controls = new PointerLockControls(camera, document.body);

            instructions.addEventListener('click', function () {
                if(!isGameOver) controls.lock();
                else resetGame();
            });

            controls.addEventListener('lock', function () {
                instructions.style.display = 'none';
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
                if(!isGameOver) {
                    instructions.style.display = '';
                    instructions.innerHTML = '<span style="font-size:36px">Click to Resume</span>';
                }
            });

            scene.add(controls.getObject());

            // Key mappings
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = true;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = true;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = true;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = true;
                        break;
                    case 'Space':
                        if (canJump === true) velocity.y += 350;
                        canJump = false;
                        break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = false;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = false;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = false;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = false;
                        break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);
            
            // Grid texture helper
            const gridHelper = new THREE.GridHelper(2000, 50);
            scene.add(gridHelper);

            const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x228b22 }); // Green
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            scene.add(floor);

            // Objects
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function spawnEnemy() {
            const geometry = new THREE.BoxGeometry(5, 5, 5);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const enemy = new THREE.Mesh(geometry, material);

            // Spawn random position around player at a distance
            const angle = Math.random() * Math.PI * 2;
            const distance = 50 + Math.random() * 50;
            const pPos = controls.getObject().position;
            
            enemy.position.x = pPos.x + Math.cos(angle) * distance;
            enemy.position.y = 2.5; // Half height
            enemy.position.z = pPos.z + Math.sin(angle) * distance;

            scene.add(enemy);
            enemies.push(enemy);
        }

        function updateEnemies(delta) {
            const pPos = controls.getObject().position;
            const speed = 20.0; // Enemy speed

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const directionVector = new THREE.Vector3().subVectors(pPos, enemy.position);
                directionVector.y = 0; // Don't move up/down
                
                const dist = directionVector.length();
                directionVector.normalize();

                // Move enemy
                enemy.position.addScaledVector(directionVector, speed * delta);
                enemy.lookAt(pPos);

                // Collision detection
                if (dist < 5) {
                    health -= 1;
                    healthEl.textContent = Math.floor(health);
                    // Push enemy back a bit on hit
                    const pushBack = directionVector.clone().negate().multiplyScalar(10);
                    enemy.position.add(pushBack);
                    
                    if (health <= 0) {
                        gameOver();
                    }
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            controls.unlock();
            instructions.innerHTML = '<span style="font-size:36px; color: red;">GAME OVER</span><br/><br/>Score: ' + Math.floor(score) + '<br/>Click to Restart';
            instructions.style.display = '';
            blocker.style.display = 'flex';
        }

        function resetGame() {
            isGameOver = false;
            health = 100;
            score = 0;
            healthEl.textContent = health;
            scoreEl.textContent = score;

            // Remove all enemies
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            
            // Reset position
            velocity.set(0, 0, 0);
            controls.getObject().position.set(0, 10, 0);

            controls.lock();
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                velocity.y -= 9.8 * 100.0 * delta; // 100.0 = mass

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // this ensures consistent movements in all directions

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                controls.getObject().position.y += (velocity.y * delta); // new behavior

                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10;
                    canJump = true;
                }

                // Simple scoring
                score += delta;
                scoreEl.textContent = Math.floor(score);

                // Enemy spawning
                if (time - lastEnemySpawn > 2000) { // Spawn every 2 seconds
                    spawnEnemy();
                    lastEnemySpawn = time;
                }

                updateEnemies(delta);

                // controls.getObject().position.y = 10; // Removed hardcoded height
            }

            prevTime = time;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
