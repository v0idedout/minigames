<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE-ALITY: THE ABYSS</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1 style="color:#ff00ff">FATE-ALITY</h1>
            <p>Objective: Reach the saferooms between brick hallways.</p>
            <p>Controls: WASD to Move. Hold C over a safe spot to hide. Hold LSHIFT to RUN.</p>
            <p>Multiple enemies will try to stop you.</p>
            <h2 style="margin-top:20px">CLICK TO START</h2>
        </div>
    </div>

    <a href="../hub/" id="back-btn">Back to Hub</a>

    <div id="ui">
        <div>ROOMS CLEARED: <span id="roomCount">0</span></div>
        <div id="status" style="margin-top:10px; color: #00ff00;">READY</div>
    </div>

    <div id="star-overlay" class="star-emitter"></div>
    <div id="triangle-overlay" class="triangle-emitter"></div>
    <div id="raintangle-overlay" class="raintangle-emitter"></div>
    <div id="semi-overlay" class="semi-emitter"></div>
    <div id="demi-overlay" class="demi-emitter"></div>
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
