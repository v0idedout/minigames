<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE-ALITY: THE ABYSS</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            background: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff00ff;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
        }
        canvas {
            display: block;
        }
        #blocker {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            z-index: 100;
        }
        #instructions { text-align: center; cursor: pointer; }
        .star-emitter {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(255, 255, 0, 0);
            transition: box-shadow 0.5s;
        }
        .warning {
            box-shadow: inset 0 0 100px rgba(255, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1 style="color:#ff00ff">FATE-ALITY</h1>
            <p>Objective: Reach the saferooms between brick hallways.</p>
            <p>Controls: WASD to Move. Hold C over a safe spot to hide.</p>
            <p style="color:yellow">Watch the screen edges for stars - THE STAR is coming.</p>
            <h2 style="margin-top:20px">CLICK TO START</h2>
        </div>
    </div>

    <a href="../hub/index.html" id="back-btn">Back to Hub</a>
    
    <div id="ui">
        <div>ROOMS CLEARED: <span id="roomCount">0</span></div>
        <div id="status" style="margin-top:10px; color: #00ff00;">READY</div>
    </div>

    <div id="star-overlay" class="star-emitter"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const roomCountEl = document.getElementById("roomCount");
const statusEl = document.getElementById("status");
const starOverlay = document.getElementById("star-overlay");
const blocker = document.getElementById("blocker");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game State
let isPlaying = false;
let roomsCleared = 0;
let player = { x: 100, y: 0, radius: 15, speed: 5, isHidden: false };
let camera = { x: 0 };
let map = []; // Array of hallways and rooms
let starEnemy = { active: false, x: 0, timer: 0, speed: 20, warningSign: false };

const HALL_HEIGHT = 200;
const ROOM_WIDTH = 800;
const SAFE_SPOT_WIDTH = 60;

function init() {
    player.y = canvas.height / 2;
    map = [];
    roomsCleared = 0;
    camera.x = 0;
    generateMapChunk(0);
}

function generateMapChunk(startX) {
    let x = startX;
    for (let i = 0; i < 5; i++) {
        // Hallway
        map.push({
            type: 'hall',
            x: x,
            width: ROOM_WIDTH,
            safeSpot: Math.random() < 0.7 ? { x: x + 200 + Math.random() * (ROOM_WIDTH - 400) } : null
        });
        x += ROOM_WIDTH;
        // Door/Saferoom Transition
        map.push({
            type: 'door',
            x: x,
            width: 100
        });
        x += 100;
    }
}

// Input
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

blocker.addEventListener('click', () => {
    blocker.style.display = 'none';
    isPlaying = true;
    init();
});

function update() {
    if (!isPlaying) return;

    // Movement
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    // Boundary & Hallway constraints
    player.y = Math.max(canvas.height/2 - 50, Math.min(player.y, canvas.height/2 + 50));
    player.x = Math.max(0, player.x);

    // Hiding Logic
    player.isHidden = false;
    if (keys['KeyC']) {
        // Check if over a safe spot
        map.forEach(segment => {
            if (segment.type === 'hall' && segment.safeSpot) {
                const ssX = segment.safeSpot.x;
                if (player.x > ssX && player.x < ssX + SAFE_SPOT_WIDTH) {
                    player.isHidden = true;
                }
            }
        });
    }

    // Camera follow
    camera.x = player.x - 200;

    // Room Clearing Check
    const currentRoom = Math.floor(player.x / (ROOM_WIDTH + 100));
    if (currentRoom > roomsCleared) {
        roomsCleared = currentRoom;
        roomCountEl.innerText = roomsCleared;
        if (map.length - (roomsCleared * 2) < 5) generateMapChunk(map[map.length-1].x + map[map.length-1].width);
    }

    // Star Enemy Logic
    if (!starEnemy.active) {
        starEnemy.timer++;
        if (starEnemy.timer > 300) { // Warning phase
            starEnemy.warningSign = true;
            starOverlay.classList.add('warning');
            statusEl.innerText = "!!! RUN !!!";
            statusEl.style.color = "yellow";
        }
        if (starEnemy.timer > 500) { // Spawn
            starEnemy.active = true;
            starEnemy.x = camera.x - 500;
            starEnemy.warningSign = false;
        }
    } else {
        starEnemy.x += starEnemy.speed;
        if (starEnemy.x > player.x + canvas.width) {
            starEnemy.active = false;
            starEnemy.timer = 0;
            starOverlay.classList.remove('warning');
            statusEl.innerText = "SAFE";
            statusEl.style.color = "#00ff00";
        }

        // Collision Check
        if (Math.abs(starEnemy.x - player.x) < 50) {
            if (!player.isHidden) {
                die();
            }
        }
    }
}

function die() {
    isPlaying = false;
    blocker.style.display = 'flex';
    document.querySelector('#instructions h1').innerText = "FATE-AL ERROR";
    document.querySelector('#instructions p').innerText = "The Star claimed your soul.";
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, 0);

    // Draw Map
    map.forEach(segment => {
        if (segment.x + segment.width < camera.x || segment.x > camera.x + canvas.width) return;

        if (segment.type === 'hall') {
            // Hallway floor/walls (brick style)
            ctx.fillStyle = "#331a00"; // Dark wood/brick
            ctx.fillRect(segment.x, canvas.height/2 - 70, segment.width, 140);
            
            ctx.strokeStyle = "#553311";
            ctx.lineWidth = 2;
            for(let i=0; i<segment.width; i+=40) {
                ctx.strokeRect(segment.x + i, canvas.height/2 - 70, 40, 140);
            }

            // Safe Spot
            if (segment.safeSpot) {
                ctx.fillStyle = "#ffff99"; // Light glowing alcove
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ffff00";
                ctx.fillRect(segment.safeSpot.x, canvas.height/2 - 65, SAFE_SPOT_WIDTH, 130);
                ctx.shadowBlur = 0;
            }
        } else {
            // Door / Saferoom
            ctx.fillStyle = "#004400";
            ctx.fillRect(segment.x, canvas.height/2 - 80, segment.width, 160);
            ctx.fillStyle = "#996633"; // Door
            ctx.fillRect(segment.x + 30, canvas.height/2 - 50, 40, 100);
        }
    });

    // Draw Star Enemy
    if (starEnemy.active) {
        drawStar(starEnemy.x, canvas.height/2, 40, 5, 20);
    }

    // Draw Player
    ctx.fillStyle = player.isHidden ? "#555" : "#fff";
    ctx.shadowBlur = player.isHidden ? 0 : 10;
    ctx.shadowColor = "#fff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();

    // Star Warnings (CSS handles most, but let's draw some particles)
    if (starEnemy.warningSign) {
        for(let i=0; i<5; i++) {
            drawStar(Math.random() * canvas.width, Math.random() * canvas.height, 5, 5, 2, "rgba(255,255,0,0.5)");
        }
    }

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

function drawStar(cx, cy, spikes, outerRadius, innerRadius, color = "yellow") {
    let rot = Math.PI / 2 * 3;
    let x = cx;
    let y = cy;
    let step = Math.PI / spikes;

    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.lineWidth = 5;
    ctx.strokeStyle = color;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fill();
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

draw();
</script>
</body>
</html>
