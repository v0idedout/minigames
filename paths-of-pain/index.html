<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paths of Pain</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 10px;
            text-align: center;
            transition: opacity 2s, transform 2s;
        }
        #ui.minimized {
            opacity: 0.5;
            pointer-events: none;
        }
        #ui.minimized h1, #ui.minimized p {
            display: none;
        }
        #ui.minimized .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            margin: 0;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 1001;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }
        .stats { font-size: 1.2rem; color: #ff3e3e; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff00ff;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <a href="../index.html" id="back-btn">Back to Hub</a>

    <div id="ui">
        <h1>PATHS OF PAIN</h1>
        <div class="stats">TIME: <span id="timer">0.00</span>s</div>
        <p>Use Arrow Keys or WASD to Move. LShift to crouch. Reach the Green Portal.</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");

// Game Constants
const TILE_SIZE = 40;
const VIEWPORT_WIDTH = window.innerWidth;
const VIEWPORT_HEIGHT = window.innerHeight;

// Force full screen canvas
canvas.width = VIEWPORT_WIDTH;
canvas.height = VIEWPORT_HEIGHT;
canvas.style.position = 'absolute';
canvas.style.top = '0';
canvas.style.left = '0';
canvas.style.zIndex = '-1'; // Behind UI

// Maze Generation Constants
const MAZE_COLS = 50; 
const MAZE_ROWS = 50;
const SPIKE_SIZE = 12; // Height of spikes sticking out from wall
const TOTAL_WIDTH = MAZE_COLS * TILE_SIZE;
const TOTAL_HEIGHT = MAZE_ROWS * TILE_SIZE;

let startTime; 
let gameInterval;
let isPlaying = false;
let map = [];
let enemies = [];
let player = { x: 0, y: 0, vx: 0, vy: 0, speed: 5, size: 20, isHiding: false };

// Camera
let camera = { x: 0, y: 0 };

function lerp(start, end, amt) {
    return (1 - amt) * start + amt * end;
}

function generateMaze() {
    // Randomized Prim's Algorithm or DFS. Let's do a simple recursive backtracker for a maze.
    // 1 = Wall, 0 = Path, 2 = Spike, 3 = End, 4 = Start
    map = [];

    // Initialize with all walls
    for(let r=0; r<MAZE_ROWS; r++) {
        let row = [];
        for(let c=0; c<MAZE_COLS; c++) {
            row.push(1);
        }
        map.push(row);
    }
    
    // Recursive Backtracker
    const stack = [];
    const startX = 1;
    const startY = 1;
    
    map[startY][startX] = 0;
    stack.push({x: startX, y: startY});

    const directions = [[0, 2], [0, -2], [2, 0], [-2, 0]]; // Jump 2 to leave walls between paths

    while(stack.length > 0) {
        const current = stack[stack.length - 1];
        const {x, y} = current;
        
        // Find unvisited neighbors
        const neighbors = [];
        for (let d of directions) {
            const nx = x + d[0];
            const ny = y + d[1];
            if (nx > 0 && nx < MAZE_COLS - 1 && ny > 0 && ny < MAZE_ROWS - 1 && map[ny][nx] === 1) {
                neighbors.push({nx, ny, dx: d[0]/2, dy: d[1]/2});
            }
        }

        if (neighbors.length > 0) {
            const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
            // Knock down wall between
            map[y + chosen.dy][x + chosen.dx] = 0;
            // Mark neighbor as visited path
            map[chosen.ny][chosen.nx] = 0;
            stack.push({x: chosen.nx, y: chosen.ny});
        } else {
            stack.pop();
        }
    }
    
    // Add Start and End
    map[1][1] = 4; // Start
    player.x = 1 * TILE_SIZE + TILE_SIZE/2;
    player.y = 1 * TILE_SIZE + TILE_SIZE/2;

    // Pick a random spot far away for End
    let endX = MAZE_COLS - 2;
    let endY = MAZE_ROWS - 2;
    // Walk back until we find a path if it's a wall (though generation usually ensures corners are reachable if odd dimensions, let's differ slightly if not)
    while(map[endY][endX] === 1) {
         endX--;
         if (endX < 1) { endX = MAZE_COLS - 2; endY--; }
    }
    map[endY][endX] = 3;

    // Add Spikes randomly on paths
    for(let r=1; r<MAZE_ROWS-1; r++) {
        for(let c=1; c<MAZE_COLS-1; c++) {
            if(map[r][c] === 0 && Math.random() < 0.1) { // 10% chance
                 // Ensure we don't block Start/End immediate area
                 if (Math.abs(r-1) + Math.abs(c-1) > 2 && Math.abs(r-endY) + Math.abs(c-endX) > 2) {
                     map[r][c] = 2; // Spike
                 }
            }
        }
    }

    // Add Rotating Square Enemies
    enemies = [];
    let attempts = 0;
    while(enemies.length < 30 && attempts < 500) {
        attempts++;
        let r = Math.floor(Math.random() * (MAZE_ROWS - 2)) + 1;
        let c = Math.floor(Math.random() * (MAZE_COLS - 2)) + 1;
        
        if (map[r][c] === 0 && Math.abs(r-1) + Math.abs(c-1) > 5) {
            // Check if there's enough room for a patrol (at least 2 tiles of empty space)
            const canGoHorizontal = (map[r][c-1] === 0 || map[r][c+1] === 0);
            const canGoVertical = (map[r-1][c] === 0 || map[r+1][c] === 0);

            if (canGoHorizontal || canGoVertical) {
                let horizontal = canGoHorizontal;
                if (canGoHorizontal && canGoVertical) horizontal = Math.random() > 0.5;

                enemies.push({
                    x: c * TILE_SIZE + TILE_SIZE/2,
                    y: r * TILE_SIZE + TILE_SIZE/2,
                    vx: horizontal ? 2 : 0,
                    vy: horizontal ? 0 : 2,
                    size: 25,
                    angle: 0,
                    rotationSpeed: 0.05 + Math.random() * 0.1
                });
            }
        }
    }
}

function loadLevel() {
    generateMaze();
    resetTimer();
}

function resetTimer() {
    startTime = Date.now();
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        timerEl.innerText = elapsed.toFixed(2);
    }, 50);
}

// Input handling
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(!isPlaying && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.code)) {
        isPlaying = true;
        resetTimer();
    }
});
document.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    player.isHiding = !!keys['ShiftLeft'];
    const currentSpeed = player.isHiding ? player.speed * 0.5 : player.speed;

    // Movement
    if (keys['ArrowUp'] || keys['KeyW']) player.vy = -currentSpeed;
    else if (keys['ArrowDown'] || keys['KeyS']) player.vy = currentSpeed;
    else player.vy = 0;

    if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -currentSpeed;
    else if (keys['ArrowRight'] || keys['KeyD']) player.vx = currentSpeed;
    else player.vx = 0;

    // Apply movement & collision
    movePlayer(player.vx, 0); // X axis
    movePlayer(0, player.vy); // Y axis

    checkHazards();
    checkWin();

    // Camera follow
    // Target position is player centered
    const targetCamX = player.x - canvas.width / 2;
    const targetCamY = player.y - canvas.height / 2;
    
    // Smooth lerp
    camera.x = lerp(camera.x, targetCamX, 0.1);
    camera.y = lerp(camera.y, targetCamY, 0.1);

    // Bounds clamping (don't show outside the maze world technically, but maybe infinite void is fine visually)
    camera.x = Math.max(0, Math.min(camera.x, TOTAL_WIDTH - canvas.width));
    camera.y = Math.max(0, Math.min(camera.y, TOTAL_HEIGHT - canvas.height));

    // Update Enemies
    enemies.forEach(enemy => {
        enemy.angle += enemy.rotationSpeed;
        
        const nextX = enemy.x + enemy.vx;
        const nextY = enemy.y + enemy.vy;
        const margin = enemy.size / 2;

        const leftCol = Math.floor((nextX - margin) / TILE_SIZE);
        const rightCol = Math.floor((nextX + margin) / TILE_SIZE);
        const topRow = Math.floor((nextY - margin) / TILE_SIZE);
        const bottomRow = Math.floor((nextY + margin) / TILE_SIZE);

        if (isSolid(leftCol, topRow) || isSolid(rightCol, topRow) ||
            isSolid(leftCol, bottomRow) || isSolid(rightCol, bottomRow)) {
            enemy.vx *= -1;
            enemy.vy *= -1;
        } else {
            enemy.x = nextX;
            enemy.y = nextY;
        }

        // Collision with player
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < (player.size/2 + enemy.size/2) && !player.isHiding) {
            die();
        }
    });
}

function movePlayer(vx, vy) {
    const nextX = player.x + vx;
    const nextY = player.y + vy;
    const margin = player.size / 2;

    // Map bounds check
    const leftCol = Math.floor((nextX - margin) / TILE_SIZE);
    const rightCol = Math.floor((nextX + margin) / TILE_SIZE);
    const topRow = Math.floor((nextY - margin) / TILE_SIZE);
    const bottomRow = Math.floor((nextY + margin) / TILE_SIZE);

    // Collision Check (Walls = 1)
    if (!isSolid(leftCol, topRow) && !isSolid(rightCol, topRow) &&
        !isSolid(leftCol, bottomRow) && !isSolid(rightCol, bottomRow)) {
            player.x = nextX;
            player.y = nextY;
    }
}

function isSolid(c, r) {
    if (r < 0 || r >= MAZE_ROWS || c < 0 || c >= MAZE_COLS) return true;
    return map[r][c] === 1;
}

function isHazard(c, r) {
    if (r < 0 || r >= MAZE_ROWS || c < 0 || c >= MAZE_COLS) return false;
    return map[r][c] === 2; // Hit spike
}

function checkHazards() {
    if (player.isHiding) return;
    const margin = player.size / 3; 
    const corners = [
        {x: player.x - margin, y: player.y - margin},
        {x: player.x + margin, y: player.y - margin},
        {x: player.x - margin, y: player.y + margin},
        {x: player.x + margin, y: player.y + margin}
    ];

    for (let p of corners) {
        const c = Math.floor(p.x / TILE_SIZE);
        const r = Math.floor(p.y / TILE_SIZE);
        
        if (r >= 0 && r < MAZE_ROWS && c >= 0 && c < MAZE_COLS && map[r][c] === 2) {
            // Precise spike collision
            const dir = getSpikeDirection(r, c);
            const tx = p.x % TILE_SIZE;
            const ty = p.y % TILE_SIZE;

            if (dir === 'top' && ty < SPIKE_SIZE) die();
            if (dir === 'bottom' && ty > TILE_SIZE - SPIKE_SIZE) die();
            if (dir === 'left' && tx < SPIKE_SIZE) die();
            if (dir === 'right' && tx > TILE_SIZE - SPIKE_SIZE) die();
        }
    }
}

function getSpikeDirection(r, c) {
    if (r > 0 && map[r-1][c] === 1) return 'top';
    if (r < MAZE_ROWS - 1 && map[r+1][c] === 1) return 'bottom';
    if (c > 0 && map[r][c-1] === 1) return 'left';
    if (c < MAZE_COLS - 1 && map[r][c+1] === 1) return 'right';
    return 'top'; // fallback
}

function checkWin() {
    const c = Math.floor(player.x / TILE_SIZE);
    const r = Math.floor(player.y / TILE_SIZE);
    if (map[r][c] === 3) {
        alert("You found the exit! Loading next maze...");
        loadLevel();
    }
}

function die() {
    // Return to start
    player.x = 1.5 * TILE_SIZE;
    player.y = 1.5 * TILE_SIZE;
    camera.x = 0; 
    camera.y = 0;
    
    // Flash
    ctx.fillStyle = "red";
    ctx.fillRect(0,0,canvas.width, canvas.height);
}

function draw() {
    // Clear Screen
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Translate by camera
    ctx.translate(-camera.x, -camera.y);

    // Only draw visible tiles for performance optimization
    const startCol = Math.floor(camera.x / TILE_SIZE);
    const endCol = startCol + (canvas.width / TILE_SIZE) + 1;
    const startRow = Math.floor(camera.y / TILE_SIZE);
    const endRow = startRow + (canvas.height / TILE_SIZE) + 1;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            if (r < 0 || r >= MAZE_ROWS || c < 0 || c >= MAZE_COLS) continue;

            const tile = map[r][c];
            const x = c * TILE_SIZE;
            const y = r * TILE_SIZE;

            if (tile === 1) { // Wall
                ctx.fillStyle = '#444';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#222';
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            } else if (tile === 2) { // Spike
                const dir = getSpikeDirection(r, c);
                ctx.fillStyle = '#ff0000';
                
                const count = 3; // number of small spikes
                const sWidth = TILE_SIZE / count;

                for (let i = 0; i < count; i++) {
                    ctx.beginPath();
                    if (dir === 'top') {
                        ctx.moveTo(x + i * sWidth, y);
                        ctx.lineTo(x + (i + 0.5) * sWidth, y + SPIKE_SIZE);
                        ctx.lineTo(x + (i + 1) * sWidth, y);
                    } else if (dir === 'bottom') {
                        ctx.moveTo(x + i * sWidth, y + TILE_SIZE);
                        ctx.lineTo(x + (i + 0.5) * sWidth, y + TILE_SIZE - SPIKE_SIZE);
                        ctx.lineTo(x + (i + 1) * sWidth, y + TILE_SIZE);
                    } else if (dir === 'left') {
                        ctx.moveTo(x, y + i * sWidth);
                        ctx.lineTo(x + SPIKE_SIZE, y + (i + 0.5) * sWidth);
                        ctx.lineTo(x, y + (i + 1) * sWidth);
                    } else if (dir === 'right') {
                        ctx.moveTo(x + TILE_SIZE, y + i * sWidth);
                        ctx.lineTo(x + TILE_SIZE - SPIKE_SIZE, y + (i + 0.5) * sWidth);
                        ctx.lineTo(x + TILE_SIZE, y + (i + 1) * sWidth);
                    }
                    ctx.fill();
                }
            } else if (tile === 3) { // End
                ctx.fillStyle = '#00ff00';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff00';
                ctx.fillRect(x+5, y+5, TILE_SIZE-10, TILE_SIZE-10);
                ctx.shadowBlur = 0;
            } else if (tile === 4) { // Start
                 ctx.fillStyle = '#0000ff';
                 ctx.globalAlpha = 0.3;
                 ctx.fillRect(x+5, y+5, TILE_SIZE-10, TILE_SIZE-10);
                 ctx.globalAlpha = 1.0;
            }
        }
    }

    // Draw Player
    ctx.fillStyle = player.isHiding ? 'rgba(255, 255, 255, 0.3)' : '#fff';
    ctx.shadowBlur = player.isHiding ? 5 : 10;
    ctx.shadowColor = '#fff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Draw Enemies
    enemies.forEach(enemy => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.angle);
        ctx.fillStyle = '#ff00ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff00ff';
        ctx.fillRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
        ctx.restore();
    });

    ctx.restore();

    // Loop
    requestAnimationFrame(function() {
        update();
        draw();
    });
}


// Init Game
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Fade UI after 10 seconds
setTimeout(() => {
    document.getElementById('ui').classList.add('minimized');
}, 10000);

loadLevel();
draw();

</script>
</body>
</html>
